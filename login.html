<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Videobelajar</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="logo">
      <img src="images/logo.png" alt="Videobelajar Logo">
    </div>
  </header>

  <!-- Kontainer Login -->
  <main class="login-container">
    <h2>Masuk ke Akun</h2>
    <p class="subtext">Yuk, lanjutkan belajarmu di videobelajar.</p>

    <form id="loginForm">
      <label for="email">E-Mail *</label>
      <input type="email" id="email" placeholder="Masukkan email" required>

      <label for="password">Kata Sandi *</label>
      <input type="password" id="password" placeholder="Masukkan kata sandi" required>

      <a href="#" class="forgot">Lupa Password?</a>

      <button type="submit" class="btn-primary">Masuk</button>
      <a href="register.html" class="btn-secondary">Daftar</a>

      <div class="divider">atau</div>

      <button type="button" class="btn-google">
        <img src="images/google.png" alt="Google Logo"> Masuk dengan Google
      </button>
    </form>
  </main>

  <script src="js/login.js"></script>
</body>
</html>
